<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aeter // SKIN TURNS RED</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: rgba(18, 18, 18, 0.80);
            --accent-orange: #d48a3b;
            --accent-red: #8b2a2a;
            --accent-green: #98ff98;
            --text-main: #e0e0e0;
            --text-muted: #666666;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            cursor: default;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
        }

        #enter-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(13, 13, 13, 0.7);
            backdrop-filter: blur(5px);
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: opacity 0.5s ease;
        }

        #enter-text {
            cursor: pointer;
            transition: color 0.3s;
        }

        #enter-text:hover {
            color: var(--text-main);
        }

        #loader-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .loader-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            animation: text-jitter 0.3s infinite steps(2);
        }

        .sketchy-box {
            width: 200px;
            height: 16px;
            border: 2px solid var(--text-muted);
            padding: 2px;
            position: relative;
            animation: outline-jitter 0.4s infinite steps(3);
        }

        #sketch-bar {
            height: 100%;
            background-color: var(--text-main);
            width: 0%;
            transition: width 0.1s linear;
            animation: fill-jitter 0.3s infinite steps(3);
        }

        @keyframes text-jitter {
            0% { transform: translate(0, 0); }
            50% { transform: translate(1px, -1px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes outline-jitter {
            0% { border-radius: 2px 8px 3px 6px / 5px 3px 7px 2px; transform: rotate(0deg); }
            33% { border-radius: 7px 2px 6px 3px / 2px 7px 4px 6px; transform: rotate(-0.5deg); }
            66% { border-radius: 3px 6px 2px 8px / 6px 4px 2px 7px; transform: rotate(0.5deg); }
            100% { border-radius: 2px 8px 3px 6px / 5px 3px 7px 2px; transform: rotate(0deg); }
        }

        @keyframes fill-jitter {
            0% { transform: scaleY(1); opacity: 0.8; }
            33% { transform: scaleY(0.85); opacity: 1; }
            66% { transform: scaleY(0.95); opacity: 0.9; }
            100% { transform: scaleY(1); opacity: 0.8; }
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }

        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            pointer-events: none;
            z-index: 10;
        }

        #ui-layer.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .quote-container {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }

        .quote-text {
            color: var(--accent-orange);
            font-size: 0.85rem;
            line-height: 1.4;
            display: block;
        }

        .quote-author {
            color: var(--accent-red);
            font-size: 0.75rem;
            margin-top: 6px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-layout {
            display: flex;
            width: 100%;
            justify-content: center;
            position: relative;
        }

        .center-dashboard {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            padding-bottom: 8px;
            color: var(--text-muted);
            border-bottom: 1px solid #1a1a1a;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .visualizer-container {
            width: 100%;
            height: 180px;
            background: #000;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .visualizer-container img,
        .visualizer-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: hue-rotate(180deg) contrast(1.1);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
            padding: 10px 5px;
        }

        .link-item {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            opacity: 0.8;
        }

        .link-item:hover {
            opacity: 1;
            color: var(--accent-orange);
        }

        .footer-status {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
        }

        .user-id {
            color: var(--accent-green);
            font-weight: bold;
            margin-bottom: 5px;
        }

        .spotify-bar {
            color: #1DB954;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        #mute-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s;
        }

        #mute-btn:hover {
            color: var(--accent-orange);
            border-color: var(--accent-orange);
        }

        @media (max-width: 500px) {
            .links-grid { grid-template-columns: 1fr 1fr; }
            .quote-text { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div id="enter-screen">
        <div id="loader-wrapper">
            <div class="loader-text">loading...</div>
            <div class="sketchy-box">
                <div id="sketch-bar"></div>
            </div>
        </div>
        <div id="enter-text" style="display: none; opacity: 0;">
            [ click to enter ]
        </div>
    </div>

    <video id="bg-video" src="bg.mp4" loop playsinline preload="auto"></video>

    <div id="ui-layer">
        <button id="mute-btn">mute</button>

        <div class="container">
            <div class="quote-container">
                <span class="quote-text">SKIN TURNS RED</span>
            </div>

            <div class="main-layout">
                <div class="center-dashboard">
                    <div class="panel-header">
                        <span id="current-time">00:00:00</span>
                        <span id="current-date">Loading...</span>
                    </div>

                    <div class="visualizer-container" id="visualizer">
                        <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExM2o0Zzl5YXR4YnQ1ZzB6eG81bmR5bmR5bmR5bmR5bmR5bmR5bmR5JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/mSg9adZ4wQ7XW/giphy.gif" alt="visuals">
                    </div>

                    <div class="links-grid">
                        <a href="https://www.youtube.com/@shizevfx" target="_blank" rel="noopener noreferrer" class="link-item">youtube</a>
                        <a href="https://github.com/shizevfx" target="_blank" rel="noopener noreferrer" class="link-item">github</a>
                        <a href="https://namemc.com/profile/ihate6yari.1" target="_blank" rel="noopener noreferrer" class="link-item">name.mc</a>
                        <a href="https://www.last.fm/user/shizefx" target="_blank" rel="noopener noreferrer" class="link-item">last.fm</a>
                    </div>
                </div>
            </div>

            <div class="footer-status">
                <div class="user-id" id="user-status">@shizefx [loading...]</div>
                <div class="spotify-bar" id="spotify-status">
                    Connecting to Lanyard...
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPageLoaded = false;
        let isVideoLoaded = false;
        let canEnter = false;
        
        const bgVideo = document.getElementById('bg-video');

        window.addEventListener('load', () => {
            isPageLoaded = true;
        });

        if (bgVideo) {
            if (bgVideo.readyState >= 3) {
                isVideoLoaded = true;
            } else {
                bgVideo.addEventListener('canplaythrough', () => {
                    isVideoLoaded = true;
                });
            }
        } else {
            isVideoLoaded = true;
        }

        setTimeout(() => { isPageLoaded = true; isVideoLoaded = true; }, 2000); 

        const loaderWrapper = document.getElementById('loader-wrapper');
        const enterText = document.getElementById('enter-text');
        const sketchBar = document.getElementById('sketch-bar');
        
        let progress = 0;
        const loadInterval = setInterval(() => {
            if (progress < 90) {
                progress += 30;
            } else if (isPageLoaded && isVideoLoaded) {
                progress = 100;
            }

            if (progress >= 100) {
                progress = 100;
                clearInterval(loadInterval);
                if (sketchBar) sketchBar.style.width = '100%';
                
                setTimeout(() => {
                    if (loaderWrapper) loaderWrapper.style.display = 'none';
                    if (enterText) {
                        enterText.style.display = 'block';
                        void enterText.offsetWidth;
                        enterText.style.opacity = '1';
                    }
                    canEnter = true;
                }, 50);
            } else {
                if (sketchBar) sketchBar.style.width = progress + '%';
            }
        }, 20);

        function updateClock() {
            const timeEl = document.getElementById('current-time');
            const dateEl = document.getElementById('current-date');
            
            if (!timeEl || !dateEl) return;

            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            timeEl.textContent = `${hours}:${minutes}:${seconds}`;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            dateEl.textContent = now.toLocaleDateString('en-US', options);
        }

        setInterval(updateClock, 1000);
        updateClock();

        const visualizer = document.getElementById('visualizer');
        
        const assetsToTry = [
            { type: 'video', src: 'asset1.mp4' },
            { type: 'video', src: 'asset1.webm' },
            { type: 'image', src: 'asset1.gif' },
            { type: 'image', src: 'asset1.png' },
            { type: 'image', src: 'asset1.jpg' }
        ];

        function tryLoadAsset(index) {
            if (!visualizer) return;
            if (index >= assetsToTry.length) return; 

            const asset = assetsToTry[index];

            if (asset.type === 'video') {
                const video = document.createElement('video');
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                
                video.onloadeddata = () => {
                    visualizer.innerHTML = ''; 
                    visualizer.appendChild(video);
                };
                video.onerror = () => tryLoadAsset(index + 1); 
                video.src = asset.src;
            } else {
                const img = new Image();
                img.onload = () => {
                    visualizer.innerHTML = ''; 
                    visualizer.appendChild(img);
                };
                img.onerror = () => tryLoadAsset(index + 1); 
                img.src = asset.src;
            }
        }

        tryLoadAsset(0);

        const lanyardUserId = "886174926237749278";
        const userIdElement = document.getElementById('user-status');
        const spotifyElement = document.getElementById('spotify-status');

        async function fetchLanyardData() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${lanyardUserId}`);
                const json = await response.json();
                
                if (json.success && json.data) {
                    updateLanyardUI(json.data);
                } else {
                    if (spotifyElement) spotifyElement.textContent = "Could not load user data.";
                }
            } catch (error) {
                console.error("Error fetching Lanyard data:", error);
                if (spotifyElement) spotifyElement.textContent = "Lanyard connection error.";
            }
        }

        function updateLanyardUI(data) {
            if (!userIdElement || !spotifyElement) return;
            
            const status = data.discord_status || 'offline';
            userIdElement.textContent = `@shizefx [${status}]`;

            if (data.spotify) {
                const artist = data.spotify.artist.replace(/;/g, ', ');
                spotifyElement.textContent = `Listening to ${data.spotify.song} by ${artist}`;
            } else {
                spotifyElement.textContent = `No song playing on Spotify`;
            }
        }

        fetchLanyardData();
        setInterval(fetchLanyardData, 5000);

        const muteBtn = document.getElementById('mute-btn');
        const enterScreen = document.getElementById('enter-screen');
        const uiLayer = document.getElementById('ui-layer');
        let uiRevealed = false;
        let uiHidden = false;

        function revealUI() {
            if (uiRevealed || !uiLayer) return;
            uiRevealed = true;
            uiLayer.classList.add('visible');
        }

        function hideUI() {
            if (uiHidden || !uiLayer) return;
            uiHidden = true;
            uiLayer.classList.remove('visible');
        }

        if (enterScreen) {
            enterScreen.addEventListener('click', () => {
                if (!canEnter) return;

                enterScreen.style.opacity = '0';
                setTimeout(() => {
                    if(enterScreen.parentNode) enterScreen.parentNode.removeChild(enterScreen);
                }, 500);

                if (bgVideo) {
                    bgVideo.currentTime = 0;
                    bgVideo.muted = false;
                    bgVideo.play().catch(e => console.error("Video play error:", e));
                    if (muteBtn) muteBtn.textContent = 'mute';
                }

                setTimeout(revealUI, 10500);
            });
        }

        if (muteBtn && bgVideo) {
            muteBtn.addEventListener('click', () => {
                bgVideo.muted = !bgVideo.muted;
                muteBtn.textContent = bgVideo.muted ? 'unmute' : 'mute';
            });
        }

        if (bgVideo) {
            bgVideo.addEventListener('timeupdate', () => {
                const time = bgVideo.currentTime;
                
                if (time >= 10 && time < 62) {
                    revealUI();
                    uiHidden = false;
                } 
                else if (time >= 62) {
                    hideUI();
                } 
                else if (time < 10) {
                    uiRevealed = false;
                    uiHidden = false;
                    if (uiLayer) {
                        uiLayer.classList.remove('visible');
                    }
                }
            });
        }
    </script>
</body>
</html>
